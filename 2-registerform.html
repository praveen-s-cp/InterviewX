<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <style>
        .heading{
            background: rgba(133, 133, 133, 0.525);
            backdrop-filter: blur(25px);
            text-align: center;
            padding: 5px;
            font-style: oblique;
            border-radius: 10px;
        }
       
        body{
            width: 100vw;
            height: 120vh;
            background-image: url("register.jpeg");
            background-size:cover;
            background-repeat: no-repeat;
            overflow: auto;
            min-height: 100vh;
            
        }
        .form{
            width: 70vw;
            display: flex;
            justify-content: center;
            position: relative;
            top: 5vh;
            left: 15vw;
            background: rgba(133, 133, 133, 0.525);
            backdrop-filter: blur(5px);
            padding: 30px;
            border-radius: 50px;

        }
        input{
            display: flex;
            justify-content: space-evenly;
            width: 60vw;
            height: 5vh;
            border-radius:20px ;
            
            
        }
        button{
            width: 25vw;
            height: 6vh;
            position: absolute;
            top: 95vh;
            right: 26vw;
            border-radius: 20px;
        }
        button:hover{
            background: rgba(133, 133, 133, 0.697);
        }
        .al{
            font-size: large;
            position: absolute;
            top: 81vh;
            right: 7vw;
        }
    </style>
</head>

<body>
    <div class="body"> 
        <div class="heading">
            <h1>Create Your InterviewX Account</h1>
        </div>
        <div class="form">
            <form action="">
                <h5>Name<a style="color: red;">*</a></h5>
                <input type="Name" placeholder="Enter Your Name"><br>
                <h5>E-Mail<a style="color: red;">*</a></h5>
                <input type="email" placeholder="E-mail"><br>
                <h5>Phone Number<a style="color: red;">*</a></h5>
                <input type="number" placeholder="Phone number"><br>
                <h5>Password<a style="color: red;">*</a></h5>
                <input type="password" placeholder="Password">
                <h5>Confirm Password<a style="color: red;">*</a></h5>
                <input type="password" placeholder="Confirm Password"><br><br>
                <h5 class="al">Already have an account? <a href="2-login.html">Log in</a></h5>
                <button><a href="2-login.html">Register</a></button>
                <br><br>
            </form>
        </div>
    </div>
</body>
</html>
