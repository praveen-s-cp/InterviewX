<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <style>
        .heading{
            background: rgba(133, 133, 133, 0.525);
            backdrop-filter: blur(25px);
            text-align: center;
            padding: 5px;
            font-style: oblique;
            border-radius: 10px;
        }
       
        body{
            width: 100vw;
            height: 120vh;
            background-image: url("register.jpeg");
            background-size:cover;
            background-repeat: no-repeat;
            overflow: auto;
            min-height: 100vh;
            
        }
        .form{
            width: 70vw;
            display: flex;
            justify-content: center;
            position: relative;
            top: 5vh;
            left: 15vw;
            background: rgba(133, 133, 133, 0.525);
            backdrop-filter: blur(5px);
            padding: 30px;
            border-radius: 50px;

        }
        input{
            display: flex;
            justify-content: space-evenly;
            width: 60vw;
            height: 5vh;
            border-radius:20px ;
            
            
        }
        button{
            width: 25vw;
            height: 6vh;
            position: absolute;
            top: 95vh;
            right: 26vw;
            border-radius: 20px;
        }
        button:hover{
            background: rgba(133, 133, 133, 0.697);
        }
        .al{
            font-size: large;
            position: absolute;
            top: 81vh;
            right: 7vw;
        }
        #error{
            color:red;
            font-size:19px;
        }
    </style>
</head>

<body>
    <div class="body"> 
        <div class="heading">
            <h1>Create Your InterviewX Account</h1>
        </div>
        <div class="form">
            <form action="">
                <h5>Name<a style="color: red;">*</a></h5>
                <input id = "username" type="Name" placeholder="Enter Your Name"><br>

                <h5>E-Mail<a style="color: red;">*</a></h5>
                <input type="email" placeholder="E-mail"><br>
                
                <h5>Phone Number<a style="color: red;">*</a></h5>
                <input type="number" placeholder="Phone number"><br>

                <h5>Password<a style="color: red;">*</a></h5>
                <input id="password" type="password" placeholder="Password">

                <h5>Confirm Password<a style="color: red;">*</a></h5>
                <input id = "confirmPassword"type="password" placeholder="Confirm Password"><br><br>

                <p id="error" ></p>
                <h5 class="al">Already have an account? <a href="2-login.html">Log in</a></h5>
                <button type="submit">Register</button>
                <br><br>
            </form>
        </div>
    </div>
</body>

    <script>
        

        let form = document.querySelector("form");

    form.addEventListener("submit", function(e){

    let inputs = document.querySelectorAll("input");
    let phone = inputs[2];
    let password = document.getElementById("password");
    let confirmPassword = document.getElementById("confirmPassword");
    let error = document.getElementById("error");

    for(let input of inputs){
        if(input.value === ""){
            alert("Please fill all fields");
            e.preventDefault();
            return;
        }
    }

    if(phone.value.length != 10){
        alert("Enter valid 10 digit phone number");
        e.preventDefault();
        return;
    }

    if(password.value !== confirmPassword.value){
        error.innerText = "Password and Confirm Password does not match!";
        e.preventDefault();
        return;
    }
    e.preventDefault();
        let username = document.getElementById("username").value;
        let passwordValue = document.getElementById("password").value;

        localStorage.setItem("username", username);
        localStorage.setItem("password", passwordValue);

    alert("Registration Successful!");
    
        window.location.href = "2-loginC.html";
});



    </script>
</html>
